name: Benchmarks

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke-test:
    name: Benchmark Smoke Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1

      - name: Run benchmark smoke tests
        run: sbt "benchmarks/test"

  jmh-run:
    name: JMH Benchmark Run
    runs-on: ubuntu-latest
    needs: smoke-test
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1

      - name: Compile benchmarks
        run: sbt "benchmarks/Jmh/compile"

      - name: Run JMH benchmarks
        run: |
          sbt "benchmarks/Jmh/run -f 1 -wi 3 -w 1s -i 5 -r 1s -rf json -rff target/jmh-results.json" 2>&1 | tee target/jmh-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: jmh-results-${{ github.sha }}
          path: |
            target/jmh-results.json
            target/jmh-output.txt

      - name: Check for regression (>10% vs baseline)
        run: |
          BASELINE="docs/reference/benchmarks-baseline.json"
          RESULTS="target/jmh-results.json"
          if [ ! -s "$BASELINE" ] || [ "$(cat $BASELINE)" = "[]" ]; then
            echo "No baseline found — skipping regression check. Commit results as baseline to enable."
            exit 0
          fi
          python3 - <<'EOF'
          import json, sys

          with open("docs/reference/benchmarks-baseline.json") as f:
              baseline = {b["benchmark"]: b["primaryMetric"]["score"] for b in json.load(f)}

          with open("target/jmh-results.json") as f:
              current = {b["benchmark"]: b["primaryMetric"]["score"] for b in json.load(f)}

          regressions = []
          for name, score in current.items():
              if name in baseline:
                  base = baseline[name]
                  # Higher score = slower for AverageTime mode
                  change_pct = ((score - base) / base) * 100
                  if change_pct > 10:
                      regressions.append(f"  {name}: {base:.2f} -> {score:.2f} µs (+{change_pct:.1f}%)")

          if regressions:
              print("REGRESSION DETECTED (>10% slower than baseline):")
              for r in regressions:
                  print(r)
              sys.exit(1)
          else:
              print("No regressions detected.")
          EOF

      - name: Post benchmark summary
        if: always()
        run: |
          echo "### Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Benchmark | Score | Unit |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|------|" >> $GITHUB_STEP_SUMMARY
          python3 - <<'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          try:
              with open("target/jmh-results.json") as f:
                  results = json.load(f)
              for r in results:
                  name  = r["benchmark"].split(".")[-1]
                  score = r["primaryMetric"]["score"]
                  unit  = r["primaryMetric"]["scoreUnit"]
                  print(f"| {name} | {score:.2f} | {unit} |")
          except Exception as e:
              print(f"| error reading results | {e} | — |")
          EOF
