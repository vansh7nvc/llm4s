name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  workflow_call:

# Concurrency settings to prevent conflicts
concurrency:
  # For PRs, cancel duplicate runs. For pushes to main/master, queue them.
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  # Only cancel in-progress runs for pull requests, not for pushes to main/master
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Quick checks that should fail fast
  quick-checks:
    name: Quick Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v7
      
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'sbt'
      
      - uses: sbt/setup-sbt@v1
      
      - name: Check formatting
        run: sbt scalafmtCheckAll

      - name: Run Scalafix
        run: sbt scalafixAll
      
      - name: Compile
        run: sbt compile

  # Code coverage (runs on one configuration to avoid duplication)
  coverage:
    name: Code Coverage
    needs: quick-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1

      - name: Run tests with coverage
        env:
          PGVECTOR_TEST_URL: jdbc:postgresql://localhost:5432/postgres
          PGVECTOR_USER: postgres
          PGVECTOR_PASSWORD: postgres
          PGVECTOR_TEST_USER: postgres
          PGVECTOR_TEST_PASSWORD: postgres
        # Run coverage only for core to keep signal focused and CI fast
        run: sbt coverage core/test coverageAggregate

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/scala-3.7.1/scoverage-report/scoverage.xml,modules/*/target/scala-3.7.1/scoverage-report/scoverage.xml
          slug: llm4s/llm4s
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            target/scala-3.7.1/scoverage-report/
            modules/*/target/scala-3.7.1/scoverage-report/
          retention-days: 14

  # Main test matrix
  test:
    name: Test
    needs: quick-checks
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        java: [21]

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v7
      
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'sbt'
      
      - uses: sbt/setup-sbt@v1
      
      - name: Run tests
        run: sbt test
      
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ matrix.os }}
          path: |
            **/target/test-reports/
            **/target/scala-3.7.1/test-reports/
          retention-days: 5

  # All tests must pass
  all-tests-pass:
    name: All Tests Pass
    if: always()
    needs: [test, coverage]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check all tests passed
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Some tests failed"
            exit 1
          fi
          if [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "Coverage job failed"
            exit 1
          fi
          echo "All tests passed!"

  # Tier 2: Ollama integration tests — verifies full round-trip against a real
  # local LLM. Only runs on pushes to main to avoid slowing down PR builds.
  ollama-integration:
    name: Ollama Integration
    needs: quick-checks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        run: |
          ollama serve &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama server is ready"
              break
            fi
            echo "Waiting for Ollama server... ($i/30)"
            sleep 1
          done

      - name: Pull test model
        run: ollama pull qwen2.5:0.5b

      - name: Run Ollama integration tests
        run: sbt testOllama

  # Tier 3: Cloud smoke tests — minimal sanity checks against real cloud APIs.
  # Manual trigger only (workflow_dispatch) to avoid unintended API costs.
  cloud-smoke:
    name: Cloud Smoke Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'sbt'

      - uses: sbt/setup-sbt@v1

      - name: Run cloud smoke tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: sbt testSmoke
