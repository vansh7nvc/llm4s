rules = [DisableSyntax]

# IMPORTANT: scalafix's DisableSyntax rule only recognises the top-level
# `DisableSyntax.regex` config path. It has no `excludePackages` field and no
# per-rule `fileFilter`. Custom-named blocks like `DisableSyntax.MyRules { regex = [...] }`
# are silently ignored by scalafix and produce zero enforcement.
#
# To exempt a file or region from a specific rule, use a `// scalafix:off`
# marker in the source itself (optionally naming the rule, e.g.
# `// scalafix:off DisableSyntax.NoKeywordTry`). See `docs/reference/scalafix.md`.
DisableSyntax.regex = [
  {
    id = NoConfigFactory
    pattern = "\\bConfigFactory\\b"
    message = "Use PureConfig via Llm4sConfig at the app/test edge; do not call ConfigFactory directly."
  },
  {
    id = NoSysEnv
    pattern = "\\bsys\\.env\\b"
    message = "Read config via Llm4sConfig in app/test code; avoid sys.env in libraries."
  },
  {
    id = NoSystemGetenv
    pattern = "\\bSystem\\.getenv\\b"
    message = "Read config via Llm4sConfig in app/test code; avoid System.getenv in libraries."
  },
  {
    id = NoPureConfigDefault
    pattern = "\\bConfigSource\\.default\\b"
    message = "Inject typed config at the app edge; avoid direct PureConfig reads in core main sources."
  },
  {
    id = NoKeywordTry
    pattern = "(?s)\\btry\\s*\\{"
    message = "Prefer scala.util.Try(...).toResult - import org.llm4s.types.TryOps"
  },
  {
    id = NoKeywordCatch
    pattern = "(?s)\\bcatch\\s*\\{"
    message = "Prefer mapping Result errors instead of catch; use Try(...).toResult and .left.map/.fold"
  },
  {
    id = NoKeywordFinally
    pattern = "(?s)\\bfinally\\b"
    message = "Prefer ManagedResource/Using or ensure cleanup via dedicated combinators"
  }
]
