# Project version information
# This file is updated during CI builds or manually for releases

# Current version displayed in documentation
version: "0.3.2"

# Latest stable release (updated by CI on release)
latest_release: "0.3.2"

# Supported versions
scala_versions:
  - "3.7.1"

java_versions:
  - "21"

# Provider support
providers:
  - name: "OpenAI"
    status: "stable path"
    models: "GPT-4o, GPT-4, GPT-3.5, o1, o3"
  - name: "Anthropic"
    status: "stable path"
    models: "Claude 3.5, Claude 3, Claude 2"
  - name: "Azure OpenAI"
    status: "stable path"
    models: "All Azure-hosted OpenAI models"
  - name: "Ollama"
    status: "stable path"
    models: "Llama, Mistral, and all local models"
  - name: "Google Gemini"
    status: "stable path"
    models: "Gemini 2.0, Gemini 1.5 Pro, Gemini 1.5 Flash"
  - name: "DeepSeek"
    status: "stable path"
    models: "deepseek-chat, deepseek-reasoner"
  - name: "Cohere"
    status: "beta"
    models: "command-r-plus, command-r; chat client available, streaming still pending"
  - name: "Mistral"
    status: "beta"
    models: "Mistral chat models; streaming still pending"
  - name: "OpenRouter"
    status: "beta"
    models: "OpenAI-compatible models through OpenRouter"
  - name: "Z.ai"
    status: "beta"
    models: "GLM models"

# Repository info
repo_url: "https://github.com/llm4s/llm4s"
discord_url: "https://discord.gg/4uvTPn6qww"
maven_group: "org.llm4s"
maven_artifact: "core"
