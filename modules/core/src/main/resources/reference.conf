# Unified llm4s configuration namespace
llm4s {
  # Named providers.
  #
  # The provider catalog structure lives in HOCON, while secrets and
  # environment-specific values are usually injected via `${?VAR}`.
  # You choose the env var names; they do not need to follow a library-owned
  # naming convention.
  # This is the only LLM provider configuration model supported by llm4s.
  #
  providers {
    # Default named provider. If omitted, the providers config still loads,
    # but asking for the default provider will fail clearly at runtime.
    # provider = "openai-main"

    # openai-main {
